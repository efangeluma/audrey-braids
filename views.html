<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Appointments</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="profile-container">
    <img src="./images/profileIcon.png" class="profile-pic" id="profileBtn">
    <div class="dropdown" id="dropdownMenu">
     <a href="index.html">Home</a>
        <a href="appointment.HTML">Book Appointment</a>
        <a href="biography.html">Biography</a>
        <a href="views.html" id="adminOnlyLink" style="display:none;">View application</a>
        <a href="register.html" id="loginSignupLink">login/signup</a>
    </div>
    <br></br><br></br>
  <div class="container">
    <h1>All Appointments</h1>

    <div class="top-link">
      <a href="/appointment">Back to Booking Form</a> |
      <a href="/logout">Log out</a>
    </div>

    <div id="booking-list"></div>
  </div>

  <script>
    function loadBookings() {
      fetch("/api/bookings")
        .then(res => res.json())
        .then(data => {
          const list = document.getElementById("booking-list");
          list.innerHTML = "";

          if (!Array.isArray(data) || data.length === 0) {
            list.innerHTML = `<p class="empty">No appointments yet.</p>`;
            return;
          }

          const newestFirst = [...data].reverse();

          newestFirst.forEach(b => {
            const div = document.createElement("div");
            div.className = "card";

            div.innerHTML = `
              <p><strong>Hair styles:</strong> ${b.styles}</p>
              <p><strong>Client:</strong> ${b.client}</p>
              <p><strong>Phone:</strong> ${b.phone}</p>
              <p><strong>Appointment Date:</strong> ${b.appointmentDate}</p>
              <p><strong>Submitted:</strong> ${b.createdAt}</p>
              <button onclick="deleteBooking(${b.id})">Delete</button>
            `;

            list.appendChild(div);
          });
        })
        .catch(error => {
          console.error("Error loading bookings:", error);
          document.getElementById("booking-list").innerHTML =
            `<p class="empty">Could not load appointments.</p>`;
        });
    }

    function deleteBooking(id) {
      if (!confirm("Are you sure you want to delete this appointment?")) return;

      fetch("/api/bookings/" + id, {
        method: "DELETE"
      })
        .then(res => res.json())
        .then(() => loadBookings())
        .catch(error => console.error("Delete error:", error));
    }

    loadBookings();
  </script>
  <script src="profil.js"></script>
</body>
</html>
